<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXIT-VO.O — Victory</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   VICTORY SCREEN — cinematic AAA game aesthetic
   Dark / neon-blue / gold — zero cartoon elements
═══════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --void:     #01020a;
  --dark:     #050914;
  --panel:    rgba(4,10,28,.92);
  --gold:     #e8c56a;
  --gold-dim: rgba(232,197,106,.15);
  --cyan:     #00d4ff;
  --cyan-dim: rgba(0,212,255,.08);
  --green:    #00ff88;
  --red:      #ff4466;
  --tx1:      #e8f0ff;
  --tx2:      #4a6a9a;
}

html, body {
  width: 100%; height: 100%;
  background: var(--void);
  font-family: 'Rajdhani', sans-serif;
  overflow: hidden;
}

/* ── Canvas layers ── */
#cv-bg, #cv-particles, #cv-confetti {
  position: fixed; inset: 0; pointer-events: none;
}
#cv-bg         { z-index: 0; }
#cv-particles  { z-index: 1; }
#cv-confetti   { z-index: 2; }

/* ── Scanline overlay ── */
.scanlines {
  position: fixed; inset: 0; z-index: 3; pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,.08) 2px,
    rgba(0,0,0,.08) 4px
  );
}

/* ── Radial vignette ── */
.vignette {
  position: fixed; inset: 0; z-index: 3; pointer-events: none;
  background: radial-gradient(ellipse at center,
    transparent 40%,
    rgba(0,0,0,.6) 100%
  );
}

/* ══════════════════════════════════════════
   MAIN OVERLAY
══════════════════════════════════════════ */
#victory-overlay {
  position: fixed; inset: 0; z-index: 100;
  display: flex; align-items: center; justify-content: center;
  background: rgba(1,2,10,.75);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  animation: overlayIn .4s ease both;
}
@keyframes overlayIn { from { opacity:0 } to { opacity:1 } }

/* ── Central panel ── */
.v-panel {
  position: relative;
  width: min(680px, 96vw);
  background: var(--panel);
  border: 1px solid rgba(232,197,106,.3);
  border-radius: 4px;
  padding: 0;
  overflow: hidden;
  box-shadow:
    0 0 0 1px rgba(0,212,255,.06),
    0 0 80px rgba(232,197,106,.1),
    0 40px 120px rgba(0,0,0,.8);
  animation: panelIn .6s cubic-bezier(.16,1,.3,1) .1s both;
}
@keyframes panelIn {
  from { transform: scale(.88) translateY(40px); opacity:0 }
  to   { transform: scale(1)   translateY(0);    opacity:1 }
}

/* corner accents */
.v-panel::before,
.v-panel::after {
  content: '';
  position: absolute;
  width: 20px; height: 20px;
  border-color: var(--gold);
  border-style: solid;
  opacity: .6;
  z-index: 10;
}
.v-panel::before { top:0; left:0;  border-width: 2px 0 0 2px; }
.v-panel::after  { bottom:0; right:0; border-width: 0 2px 2px 0; }

/* top accent line */
.v-topline {
  height: 2px;
  background: linear-gradient(90deg,
    transparent,
    var(--cyan) 20%,
    var(--gold) 50%,
    var(--cyan) 80%,
    transparent
  );
  animation: lineGlow 2s ease-in-out infinite;
}
@keyframes lineGlow {
  0%,100% { opacity:.7 }
  50%      { opacity:1 }
}

/* ── Header band ── */
.v-header {
  padding: 24px 36px 20px;
  display: flex; align-items: center; gap: 16px;
  border-bottom: 1px solid rgba(255,255,255,.04);
  background: linear-gradient(135deg, rgba(232,197,106,.05), transparent);
}
.v-header-icon {
  font-size: 2rem;
  filter: drop-shadow(0 0 12px var(--gold));
  animation: iconPulse 1.5s ease-in-out infinite;
}
@keyframes iconPulse {
  0%,100% { filter: drop-shadow(0 0 12px var(--gold)) }
  50%     { filter: drop-shadow(0 0 24px var(--gold)) drop-shadow(0 0 40px rgba(232,197,106,.4)) }
}
.v-header-text { flex: 1 }
.v-tag {
  font-family: 'Share Tech Mono', monospace;
  font-size: .6rem; letter-spacing: 4px;
  color: var(--cyan); opacity: .7; margin-bottom: 3px;
}
.v-headline {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  letter-spacing: 4px; line-height: 1;
  color: var(--gold);
  text-shadow: 0 0 30px rgba(232,197,106,.5);
  animation: textFlicker 4s ease-in-out infinite;
}
@keyframes textFlicker {
  0%,100% { opacity:1 }
  92%     { opacity:1 }
  93%     { opacity:.85 }
  94%     { opacity:1 }
}
.v-sub {
  font-size: .8rem; letter-spacing: 2px;
  color: var(--tx2); margin-top: 4px;
}

/* ── Stats grid ── */
.v-stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 1px;
  background: rgba(255,255,255,.03);
  border-top: 1px solid rgba(255,255,255,.04);
  border-bottom: 1px solid rgba(255,255,255,.04);
}
.v-stat {
  padding: 20px 20px 18px;
  text-align: center;
  background: var(--dark);
  position: relative;
  overflow: hidden;
  animation: statIn .5s ease both;
}
.v-stat:nth-child(1) { animation-delay: .25s }
.v-stat:nth-child(2) { animation-delay: .35s }
.v-stat:nth-child(3) { animation-delay: .45s }
@keyframes statIn {
  from { opacity:0; transform: translateY(16px) }
  to   { opacity:1; transform: none }
}
.v-stat::before {
  content: '';
  position: absolute; top:0; left:0; right:0; height:1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0;
  animation: statLine .6s ease both;
}
.v-stat:nth-child(1)::before { animation-delay: .3s }
.v-stat:nth-child(2)::before { animation-delay: .4s }
.v-stat:nth-child(3)::before { animation-delay: .5s }
@keyframes statLine {
  from { opacity:0; width:0 }
  to   { opacity:.4; width:100% }
}
.v-stat-lbl {
  font-family: 'Share Tech Mono', monospace;
  font-size: .52rem; letter-spacing: 3px;
  color: var(--tx2); margin-bottom: 8px;
}
.v-stat-val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem; letter-spacing: 2px;
  line-height: 1;
}
.v-stat-val.gold  { color: var(--gold);  text-shadow: 0 0 20px rgba(232,197,106,.4) }
.v-stat-val.cyan  { color: var(--cyan);  text-shadow: 0 0 16px rgba(0,212,255,.4) }
.v-stat-val.green { color: var(--green); text-shadow: 0 0 16px rgba(0,255,136,.3) }
.v-stat-unit {
  font-family: 'Rajdhani', sans-serif;
  font-size: .65rem; letter-spacing: 2px;
  color: var(--tx2); margin-top: 3px;
}

/* ── Score bar ── */
.v-scorebar-wrap {
  padding: 20px 36px;
  border-bottom: 1px solid rgba(255,255,255,.04);
}
.v-scorebar-lbl {
  display: flex; justify-content: space-between; margin-bottom: 8px;
  font-family: 'Share Tech Mono', monospace;
  font-size: .58rem; letter-spacing: 2px; color: var(--tx2);
}
.v-scorebar-track {
  height: 4px; background: rgba(255,255,255,.05);
  border-radius: 2px; overflow: hidden;
}
.v-scorebar-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, var(--cyan), var(--gold));
  box-shadow: 0 0 12px rgba(232,197,106,.5);
  width: 0;
  transition: width 1.2s cubic-bezier(.4,0,.2,1) .6s;
}

/* ── Room pips ── */
.v-pips {
  padding: 14px 36px;
  display: flex; gap: 6px; align-items: center;
  border-bottom: 1px solid rgba(255,255,255,.04);
}
.v-pip-lbl {
  font-family: 'Share Tech Mono', monospace;
  font-size: .52rem; letter-spacing: 2px; color: var(--tx2);
  margin-right: 10px; white-space: nowrap;
}
.v-pip {
  height: 4px; flex: 1; border-radius: 2px;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.05);
  transition: all .4s ease;
}
.v-pip.done {
  background: var(--green);
  box-shadow: 0 0 8px rgba(0,255,136,.4);
  border-color: transparent;
}
.v-pip.current {
  background: var(--gold);
  box-shadow: 0 0 10px rgba(232,197,106,.5);
  border-color: transparent;
  animation: pipPulse 1s ease-in-out infinite;
}
@keyframes pipPulse { 0%,100%{opacity:1} 50%{opacity:.6} }

/* ── CTA button ── */
.v-footer {
  padding: 22px 36px 26px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.v-msg {
  font-family: 'Share Tech Mono', monospace;
  font-size: .65rem; letter-spacing: 2px; color: var(--tx2);
  max-width: 200px; line-height: 1.5;
}
.v-cta {
  position: relative; overflow: hidden;
  padding: 14px 40px;
  background: transparent;
  border: 1px solid var(--gold);
  border-radius: 2px;
  color: var(--gold);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem; letter-spacing: 5px;
  cursor: pointer;
  transition: all .25s;
  white-space: nowrap;
}
.v-cta::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--gold-dim), transparent);
  transform: translateX(-100%);
  transition: transform .3s ease;
}
.v-cta:hover { color: #fff; border-color: #fff; box-shadow: 0 0 30px rgba(232,197,106,.3); }
.v-cta:hover::before { transform: translateX(0); }
.v-cta:active { transform: scale(.97); }

/* ── bottom accent line ── */
.v-bottomline {
  height: 1px;
  background: linear-gradient(90deg,
    transparent,
    var(--gold) 50%,
    transparent
  );
  opacity: .3;
}

/* ══════════════════════════════════════════
   RANK BADGE (top-right corner of panel)
══════════════════════════════════════════ */
.v-rank-badge {
  position: absolute; top: 20px; right: 28px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3.5rem; line-height: 1;
  letter-spacing: 2px;
  opacity: 0;
  animation: rankIn .5s cubic-bezier(.16,1,.3,1) .5s both;
}
@keyframes rankIn {
  from { transform: scale(1.4); opacity:0 }
  to   { transform: scale(1);   opacity:1 }
}
.v-rank-badge.S { color: var(--gold); text-shadow: 0 0 30px rgba(232,197,106,.8) }
.v-rank-badge.A { color: var(--green); text-shadow: 0 0 30px rgba(0,255,136,.7) }
.v-rank-badge.B { color: var(--cyan);  text-shadow: 0 0 24px rgba(0,212,255,.6) }
.v-rank-badge.C { color: var(--red);   text-shadow: 0 0 20px rgba(255,68,102,.5) }

/* ══════════════════════════════════════════
   GLITCH text effect on headline
══════════════════════════════════════════ */
.glitch {
  position: relative;
}
.glitch::before,
.glitch::after {
  content: attr(data-text);
  position: absolute; top:0; left:0;
  width:100%; height:100%;
  font-family: inherit; font-size: inherit; letter-spacing: inherit;
  animation: glitchLoop 6s ease-in-out infinite;
}
.glitch::before {
  color: var(--cyan); clip-path: polygon(0 20%,100% 20%,100% 40%,0 40%);
  transform: translateX(-2px);
  animation-delay: 0s;
}
.glitch::after {
  color: var(--red); clip-path: polygon(0 65%,100% 65%,100% 80%,0 80%);
  transform: translateX(2px);
  animation-delay: .15s;
}
@keyframes glitchLoop {
  0%,88%,96%,100% { opacity:0; transform: none }
  89% { opacity:.4; transform: translateX(-3px) }
  90% { opacity:0; transform: none }
  95% { opacity:.3; transform: translateX(2px) }
}

/* ══════════════════════════════════════════
   DATA-STREAM side decoration
══════════════════════════════════════════ */
.v-stream {
  position: absolute; top:0; bottom:0;
  width: 3px;
  overflow: hidden;
  pointer-events: none;
}
.v-stream.left  { left:0 }
.v-stream.right { right:0 }
.v-stream-inner {
  position: absolute; top:-100%; left:0; right:0;
  height: 200%;
  background: repeating-linear-gradient(
    180deg,
    transparent,
    transparent 6px,
    rgba(0,212,255,.06) 6px,
    rgba(0,212,255,.06) 12px
  );
  animation: streamFlow 3s linear infinite;
}
.v-stream.right .v-stream-inner {
  background: repeating-linear-gradient(
    180deg,
    transparent,
    transparent 6px,
    rgba(232,197,106,.06) 6px,
    rgba(232,197,106,.06) 12px
  );
  animation-direction: reverse;
  animation-duration: 4s;
}
@keyframes streamFlow { from { transform: translateY(0) } to { transform: translateY(50%) } }
</style>
<script src="gameState.js"></script>
</head>
<body>

<!-- ── Background canvas layers ── -->
<canvas id="cv-bg"></canvas>
<canvas id="cv-particles"></canvas>
<canvas id="cv-confetti"></canvas>
<div class="scanlines"></div>
<div class="vignette"></div>

<!-- ══════════════════════════════════════════
     VICTORY PANEL
══════════════════════════════════════════ -->
<div id="victory-overlay">
  <div class="v-panel">

    <!-- side data streams -->
    <div class="v-stream left"><div class="v-stream-inner"></div></div>
    <div class="v-stream right"><div class="v-stream-inner"></div></div>

    <!-- rank badge -->
    <div class="v-rank-badge" id="v-rank-badge">S</div>

    <!-- top accent -->
    <div class="v-topline"></div>

    <!-- header -->
    <div class="v-header">
      <div class="v-header-icon" id="v-icon">🏆</div>
      <div class="v-header-text">
        <div class="v-tag">◈ CHALLENGE COMPLETE · EXIT-VO.O</div>
        <div class="v-headline glitch" id="v-headline" data-text="ROOM CLEARED">ROOM CLEARED</div>
        <div class="v-sub" id="v-sub">+20 BONUS · MYSTERY ROOM 1</div>
      </div>
    </div>

    <!-- stats -->
    <div class="v-stats">
      <div class="v-stat">
        <div class="v-stat-lbl">TOTAL SCORE</div>
        <div class="v-stat-val gold" id="v-score">140</div>
        <div class="v-stat-unit">POINTS</div>
      </div>
      <div class="v-stat">
        <div class="v-stat-lbl">PLAYER</div>
        <div class="v-stat-val cyan" id="v-room-pts">+20</div>
        <div class="v-stat-unit">NAME</div>
      </div>
      <div class="v-stat">
        <div class="v-stat-lbl">TIME ELAPSED</div>
        <div class="v-stat-val green" id="v-time">00:00</div>
        <div class="v-stat-unit">MM:SS</div>
      </div>
    </div>

    <!-- score progress bar -->
    <div class="v-scorebar-wrap">
      <div class="v-scorebar-lbl">
        <span>PROGRESS TO MAX</span>
        <span id="v-pct">—</span>
      </div>
      <div class="v-scorebar-track">
        <div class="v-scorebar-fill" id="v-bar"></div>
      </div>
    </div>

    <!-- room pips -->
    <div class="v-pips">
      <div class="v-pip-lbl">ROOMS</div>
      <div class="v-pip" id="pip-0"></div>
      <div class="v-pip" id="pip-1"></div>
      <div class="v-pip" id="pip-2"></div>
      <div class="v-pip" id="pip-3"></div>
      <div class="v-pip" id="pip-4"></div>
      <div class="v-pip" id="pip-5"></div>
    </div>

    <!-- footer CTA -->
    <div class="v-footer">
      <div class="v-msg" id="v-msg">SYSTEM UNLOCKED · PROCEED TO NEXT CHALLENGE</div>
      <button class="v-cta" id="v-continue-btn">CONTINUE →</button>
    </div>

    <div class="v-bottomline"></div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════════
   LIVE DATA — reads Name, USN, Score and Time from GS (localStorage)
══════════════════════════════════════════════════════════ */
const MAX_SCORE = 365;

const _score    = typeof GS !== 'undefined' ? GS.getScore()    : parseInt(localStorage.getItem('gx_score') || '0', 10);
const _name     = typeof GS !== 'undefined' ? GS.getName()     : (localStorage.getItem('gx_name') || 'UNKNOWN');
const _usn      = typeof GS !== 'undefined' ? GS.getUSN()      : (localStorage.getItem('gx_usn')  || '—');
const _elSec    = typeof GS !== 'undefined' ? GS.elapsedSec()  : 0;
const _progress = typeof GS !== 'undefined' ? GS.getProgress() : 6;

const _p    = _score / MAX_SCORE;
const _rank = _p >= 0.88 ? 'S' : _p >= 0.70 ? 'A' : _p >= 0.48 ? 'B' : 'C';
const _pct  = Math.min(100, Math.round(_p * 100));
const _mm   = String(Math.floor(_elSec / 60)).padStart(2, '0');
const _ss   = String(_elSec % 60).padStart(2, '0');
const _timeStr = _mm + ':' + _ss;

function populate() {
  document.getElementById('v-score').textContent    = _score;
  document.getElementById('v-room-pts').textContent = _name;
  document.getElementById('v-time').textContent     = _timeStr;

  document.getElementById('v-headline').textContent = 'CHALLENGE COMPLETE';
  document.getElementById('v-headline').setAttribute('data-text', 'CHALLENGE COMPLETE');
  document.getElementById('v-icon').textContent = _rank === 'S' ? '🏆' : _rank === 'A' ? '⚡' : _rank === 'B' ? '🔑' : '💀';
  document.getElementById('v-sub').textContent  = _usn;
  document.getElementById('v-msg').textContent  = 'FINAL SCORE: ' + _score + ' PTS  ·  TIME: ' + _timeStr;

  const badge = document.getElementById('v-rank-badge');
  badge.textContent = _rank;
  badge.className   = 'v-rank-badge ' + _rank;

  document.getElementById('v-pct').textContent = _pct + '%';
  setTimeout(() => { document.getElementById('v-bar').style.width = _pct + '%'; }, 100);

  for (let i = 0; i < 6; i++) {
    const pip = document.getElementById('pip-' + i);
    if (!pip) continue;
    if (i < _progress - 1)       pip.classList.add('done');
    else if (i === _progress - 1) pip.classList.add('current');
  }

  document.getElementById('v-continue-btn').textContent = 'PLAY AGAIN';
  document.getElementById('v-continue-btn').onclick = () => {
    window.location.href = '../main1screen/index.html';
  };
}

populate();

/* ══════════════════════════════════════════════════════════
   ANIMATED BACKGROUND — hex grid + data pulses
══════════════════════════════════════════════════════════ */
(function bgSetup() {
  const cv = document.getElementById('cv-bg');
  const cx = cv.getContext('2d');
  let W, H;

  function resize() { W = cv.width = innerWidth; H = cv.height = innerHeight; }
  resize(); window.addEventListener('resize', resize);

  /* Hex grid */
  const HEX_SIZE = 38;
  const HEX_GAP  = 3;

  function hexPath(x, y, r) {
    cx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (Math.PI / 3) * i - Math.PI / 6;
      const px = x + r * Math.cos(a);
      const py = y + r * Math.sin(a);
      i === 0 ? cx.moveTo(px, py) : cx.lineTo(px, py);
    }
    cx.closePath();
  }

  /* Pulsing nodes */
  const nodes = Array.from({ length: 14 }, () => ({
    x: Math.random(), y: Math.random(),
    t: Math.random() * Math.PI * 2,
    sp: 0.3 + Math.random() * 0.6,
    col: Math.random() > .5 ? '#00d4ff' : '#e8c56a',
  }));

  /* Connection lines */
  const lines = [];
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const dx = nodes[i].x - nodes[j].x;
      const dy = nodes[i].y - nodes[j].y;
      if (Math.sqrt(dx*dx+dy*dy) < .22) lines.push([i, j]);
    }
  }

  function draw(ts) {
    cx.clearRect(0, 0, W, H);

    /* Hex grid */
    const colW = HEX_SIZE * Math.sqrt(3) + HEX_GAP;
    const rowH  = HEX_SIZE * 1.5 + HEX_GAP;
    const cols  = Math.ceil(W / colW) + 2;
    const rows  = Math.ceil(H / rowH) + 2;

    for (let r = -1; r < rows; r++) {
      for (let c = -1; c < cols; c++) {
        const offset = (r % 2 === 0) ? 0 : colW / 2;
        const x = c * colW + offset;
        const y = r * rowH;
        hexPath(x, y, HEX_SIZE - HEX_GAP);

        const dist = Math.sqrt(((x/W)-.5)**2 + ((y/H)-.5)**2);
        const alpha = Math.max(0, (.4 - dist) * .06);
        cx.strokeStyle = `rgba(0,212,255,${alpha})`;
        cx.lineWidth   = 0.5;
        cx.stroke();
      }
    }

    /* Nodes */
    const t = ts * .001;
    nodes.forEach(n => {
      n.t += .008 * n.sp;
      const x = n.x * W, y = n.y * H;
      const glow = .5 + .5 * Math.sin(n.t);

      cx.beginPath();
      cx.arc(x, y, 2.5, 0, Math.PI * 2);
      cx.fillStyle   = n.col;
      cx.globalAlpha = .3 + glow * .4;
      cx.fill();

      cx.beginPath();
      cx.arc(x, y, 8 + glow * 5, 0, Math.PI * 2);
      const g = cx.createRadialGradient(x,y,0, x,y,13);
      g.addColorStop(0, n.col.replace('#','rgba(').replace(/(..)(..)(..)/, (_,r,g2,b) =>
        `${parseInt(r,16)},${parseInt(g2,16)},${parseInt(b,16)},`) + (.2*glow) + ')');
      g.addColorStop(1, 'transparent');
      cx.fillStyle   = g;
      cx.globalAlpha = 1;
      cx.fill();
    });

    /* Lines */
    lines.forEach(([i,j]) => {
      const a = nodes[i], b = nodes[j];
      cx.beginPath();
      cx.moveTo(a.x*W, a.y*H);
      cx.lineTo(b.x*W, b.y*H);
      cx.strokeStyle = 'rgba(0,212,255,.06)';
      cx.lineWidth   = 1;
      cx.stroke();
    });

    /* Central glow */
    const rg = cx.createRadialGradient(W/2,H/2,0, W/2,H/2,Math.min(W,H)*.55);
    rg.addColorStop(0, 'rgba(232,197,106,.04)');
    rg.addColorStop(.5,'rgba(0,212,255,.02)');
    rg.addColorStop(1, 'transparent');
    cx.fillStyle = rg; cx.globalAlpha = 1;
    cx.fillRect(0,0,W,H);

    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();

/* ══════════════════════════════════════════════════════════
   FLOATING PARTICLES
══════════════════════════════════════════════════════════ */
(function particleSetup() {
  const cv = document.getElementById('cv-particles');
  const cx = cv.getContext('2d');
  let W, H;

  function resize() { W = cv.width = innerWidth; H = cv.height = innerHeight; }
  resize(); window.addEventListener('resize', resize);

  const COLS = ['#e8c56a','#00d4ff','#00ff88','#ffffff'];
  const pts  = Array.from({ length: 60 }, () => ({
    x: Math.random() * W, y: Math.random() * H,
    vx: (Math.random()-.5)*.3, vy: -(Math.random()*.4+.1),
    r:  Math.random()*1.5+.3,
    a:  Math.random()*.5+.1,
    col: COLS[Math.floor(Math.random()*COLS.length)],
    ph: Math.random()*Math.PI*2
  }));

  function draw() {
    cx.clearRect(0,0,W,H);
    const t = Date.now()*.001;
    pts.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.y < -10) { p.y = H + 5; p.x = Math.random()*W; }
      if (p.x < -10) p.x = W + 5;
      if (p.x > W+10) p.x = -5;
      const pulse = .5 + .5 * Math.sin(t * 1.2 + p.ph);
      cx.beginPath();
      cx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      cx.fillStyle   = p.col;
      cx.globalAlpha = p.a * pulse;
      cx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ══════════════════════════════════════════════════════════
   CONFETTI BURST (fires once on load for top ranks)
══════════════════════════════════════════════════════════ */
function fireConfetti() {
  const cv = document.getElementById('cv-confetti');
  const cx = cv.getContext('2d');
  cv.width  = innerWidth;
  cv.height = innerHeight;

  const COLS = ['#e8c56a','#00d4ff','#00ff88','#ff4466','#ffffff','#9b5de5'];
  const bits = Array.from({ length: 180 }, () => ({
    x:   Math.random() * cv.width,
    y:  -30 - Math.random() * 200,
    w:   Math.random() * 10 + 4,
    h:   Math.random() * 5  + 2,
    c:   COLS[Math.floor(Math.random() * COLS.length)],
    vx: (Math.random() - .5) * 4,
    vy:  Math.random() * 3 + 1.5,
    rot: Math.random() * Math.PI * 2,
    rv: (Math.random() - .5) * .14,
  }));

  let f = 0;
  (function draw() {
    if (++f > 400) { cx.clearRect(0,0,cv.width,cv.height); return; }
    cx.clearRect(0,0,cv.width,cv.height);
    bits.forEach(b => {
      b.x += b.vx; b.y += b.vy; b.vy += .04; b.rot += b.rv;
      cx.save(); cx.translate(b.x, b.y); cx.rotate(b.rot);
      cx.globalAlpha = Math.max(0, 1 - f/360);
      cx.fillStyle   = b.c;
      cx.fillRect(-b.w/2, -b.h/2, b.w, b.h);
      cx.restore();
    });
    requestAnimationFrame(draw);
  })();
}

/* Fire confetti for S and A ranks */
if (['S','A'].includes(_rank)) {
  setTimeout(fireConfetti, 400);
}
